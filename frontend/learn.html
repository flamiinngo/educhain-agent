<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduChain — Learn & Earn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    .container { max-width: 700px; margin: 0 auto; padding: 30px 20px; }
    h1 { font-size: 2em; background: linear-gradient(135deg, #00ff88, #00bbff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
    
    .step { background: #111; border: 1px solid #222; border-radius: 12px; padding: 25px; margin-bottom: 20px; display: none; }
    .step.active { display: block; }
    .step h2 { color: #00bbff; margin-bottom: 15px; font-size: 1.2em; }
    
    input, select { width: 100%; padding: 12px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1em; margin-bottom: 15px; }
    input:focus, select:focus { outline: none; border-color: #00ff88; }
    
    .btn { display: inline-block; padding: 12px 30px; border-radius: 10px; border: none; font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.3s; }
    .btn-go { background: linear-gradient(135deg, #00ff88, #00bbff); color: #000; }
    .btn-go:hover { transform: translateY(-2px); }
    .btn-go:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .lesson-content { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 20px; line-height: 1.8; margin-bottom: 20px; white-space: pre-wrap; }
    
    .quiz-question { background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
    .quiz-question h3 { color: #00bbff; margin-bottom: 10px; }
    .option { display: block; padding: 10px 15px; margin: 5px 0; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .option:hover { border-color: #00ff88; }
    .option.selected { border-color: #00ff88; background: #003322; }
    
    .timer { text-align: center; font-size: 1.5em; color: #00ff88; font-family: 'Courier New', monospace; margin: 15px 0; }
    
    .result { text-align: center; padding: 20px; }
    .result .score { font-size: 3em; font-weight: bold; margin: 10px 0; }
    .result .score.pass { color: #00ff88; }
    .result .score.fail { color: #ff4444; }
    .result .detail { background: #1a1a1a; border-radius: 8px; padding: 15px; margin: 10px 0; text-align: left; }
    .result .detail a { color: #00bbff; }
    
    .loading { text-align: center; padding: 40px; }
    .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #333; border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .back { display: inline-block; color: #888; text-decoration: none; margin-bottom: 20px; }
    .back:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="container">
    <a href="/" class="back">← Back to Dashboard</a>
    <h1>📚 Learn & Earn</h1>
    <p class="subtitle">Learn something new. Get paid instantly.</p>

    <!-- STEP 1: Register -->
    <div class="step active" id="step1">
      <h2>Step 1: Create Your Account</h2>
      <input type="text" id="phoneEmail" placeholder="Enter phone number or email">
      <button class="btn btn-go" onclick="register()">Create Account →</button>
    </div>

    <!-- STEP 2: Pick Topic -->
    <div class="step" id="step2">
      <h2>Step 2: Pick a Topic</h2>
      <select id="topicSelect">
        <option value="">Choose a topic...</option>
        <option value="Clean Water Safety">Clean Water Safety</option>
        <option value="Basic Math">Basic Math</option>
        <option value="Reading Comprehension">Reading Comprehension</option>
        <option value="Climate Change">Climate Change</option>
        <option value="Personal Health">Personal Health</option>
        <option value="Farming Basics">Farming Basics</option>
        <option value="Financial Literacy">Financial Literacy</option>
        <option value="World History">World History</option>
        <option value="Basic Science">Basic Science</option>
        <option value="Digital Literacy">Digital Literacy</option>
        <option value="Nutrition">Nutrition</option>
        <option value="Solar Energy">Solar Energy</option>
        <option value="First Aid">First Aid</option>
        <option value="Recycling">Recycling</option>
        <option value="Animal Biology">Animal Biology</option>
        <option value="Geography">Geography</option>
        <option value="Electricity Basics">Electricity Basics</option>
        <option value="Human Rights">Human Rights</option>
        <option value="Internet Safety">Internet Safety</option>
        <option value="Basic Coding">Basic Coding</option>
      </select>
      <button class="btn btn-go" onclick="startLesson()">Start Lesson →</button>
    </div>

    <!-- STEP 3: Lesson -->
    <div class="step" id="step3">
      <h2>Step 3: Read Your Lesson</h2>
      <div class="lesson-content" id="lessonContent">Loading...</div>
      <button class="btn btn-go" onclick="showQuiz()">Ready for the Quiz? →</button>
    </div>

    <!-- STEP 4: Quiz -->
    <div class="step" id="step4">
      <h2>Step 4: Answer the Quiz</h2>
      <div class="timer" id="timer">⏱ 0:00</div>
      <div id="quizContainer"></div>
      <button class="btn btn-go" id="submitBtn" onclick="submitQuiz()" disabled>Submit Answers</button>
    </div>

    <!-- STEP 5: Result -->
    <div class="step" id="step5">
      <div class="result" id="resultContainer">Loading results...</div>
    </div>

    <!-- Loading overlay -->
    <div class="step" id="loading">
      <div class="loading">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#888;" id="loadingText">Generating your lesson...</p>
      </div>
    </div>
  </div>

  <script>
    let walletAddress = null;
    let currentQuiz = null;
    let quizId = null;
    let currentTopic = null;
    let quizStartTime = null;
    let timerInterval = null;
    let answers = {};

    function showStep(num) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(num).classList.add('active');
    }

    async function register() {
      const phoneEmail = document.getElementById('phoneEmail').value.trim();
      if (!phoneEmail) return alert('Please enter your phone or email');

      showStep('loading');
      document.getElementById('loadingText').textContent = 'Creating your account...';

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneOrEmail: phoneEmail })
        });
        const data = await res.json();
        walletAddress = data.walletAddress;
        showStep('step2');
      } catch (err) {
        alert('Error: ' + err.message);
        showStep('step1');
      }
    }

    async function startLesson() {
      const topic = document.getElementById('topicSelect').value;
      if (!topic) return alert('Please pick a topic');
      currentTopic = topic;

      showStep('loading');
      document.getElementById('loadingText').textContent = 'Generating your lesson...';

      try {
        const res = await fetch('/lesson', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wallet: walletAddress, topic: topic })
        });
        const data = await res.json();

        document.getElementById('lessonContent').textContent = data.lesson;
        currentQuiz = data.quiz;
        quizId = data.quizId;
        quizStartTime = data.quizStartTime;

        showStep('step3');
      } catch (err) {
        alert('Error: ' + err.message);
        showStep('step2');
      }
    }

    function showQuiz() {
      const container = document.getElementById('quizContainer');
      container.innerHTML = '';
      answers = {};

      currentQuiz.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'quiz-question';
        div.innerHTML = `<h3>Question ${i + 1}</h3><p>${q.question}</p>`;

        Object.entries(q.options).forEach(([key, val]) => {
          const opt = document.createElement('div');
          opt.className = 'option';
          opt.textContent = `${key}: ${val}`;
          opt.onclick = () => {
            div.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            answers[i] = key;
            if (Object.keys(answers).length === 5) {
              document.getElementById('submitBtn').disabled = false;
            }
          };
          div.appendChild(opt);
        });

        container.appendChild(div);
      });

      // Start timer
      let seconds = 0;
      const timerEl = document.getElementById('timer');
      timerInterval = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        timerEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;

        if (seconds >= 180) {
          timerEl.style.color = '#00ff88';
        } else {
          timerEl.style.color = '#ff8800';
        }
      }, 1000);

      showStep('step4');
    }

    async function submitQuiz() {
      clearInterval(timerInterval);

      const answerArray = [];
      for (let i = 0; i < 5; i++) {
        answerArray.push(answers[i] || 'A');
      }

      showStep('loading');
      document.getElementById('loadingText').textContent = 'Grading your quiz...';

      try {
        const res = await fetch('/submit-quiz', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            wallet: walletAddress,
            quizId: quizId,
            topic: currentTopic,
            answers: answerArray,
            quizStartTime: quizStartTime
          })
        });
        const data = await res.json();

        const container = document.getElementById('resultContainer');
        const passed = data.passed;

        container.innerHTML = `
          <div class="score ${passed ? 'pass' : 'fail'}">${passed ? '✅' : '❌'} ${data.score}/${data.outOf}</div>
          <p style="font-size:1.2em; margin:10px 0;">${data.feedback}</p>
          ${passed ? `
            <div class="detail">
              💰 <strong>${data.payment}</strong> sent to your wallet<br>
              ${data.paymentTx ? `📄 <a href="https://sepolia.basescan.org/tx/${data.paymentTx}" target="_blank">View on BaseScan</a><br>` : ''}
              ${data.filecoin ? `🗂️ <a href="${data.filecoin}" target="_blank">View on IPFS</a><br>` : ''}
              ${data.nftTokenId !== null ? `🖼️ Impact NFT #${data.nftTokenId} minted<br>` : ''}
              <br><span style="color:#00ff88;">humanInvolved: false ✓</span>
            </div>
          ` : `
            <div class="detail">
              <p>Keep studying and try again tomorrow!</p>
              <br><span style="color:#00ff88;">humanInvolved: false ✓</span>
            </div>
          `}
          <br>
          <a href="/learn" class="btn btn-go">Learn Another Topic →</a>
          <a href="/" class="btn btn-go" style="background:#1a1a1a; color:#fff; border:1px solid #333;">Back to Dashboard</a>
        `;

        showStep('step5');
      } catch (err) {
        alert('Error: ' + err.message);
        showStep('step4');
      }
    }
  </script>

</body>
</html>
